# .github/workflows/security.yml
#
# Security scan die bij elke push en pull request draait.
# Controleert op kwetsbare npm packages.

name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Elke maandag om 09:00 UTC — pikt nieuwe CVEs op
    - cron: '0 9 * * 1'

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: saas-platform/package-lock.json

      - name: Install dependencies
        working-directory: saas-platform
        run: npm ci --prefer-offline

      - name: Run security audit
        working-directory: saas-platform
        run: npm audit --audit-level=high
        # Faalt de build bij HIGH of CRITICAL kwetsbaarheden
        # LOW en MODERATE worden gerapporteerd maar blokkeren niet

      - name: Check for known vulnerable packages
        working-directory: saas-platform
        run: |
          echo "Checking for outdated packages..."
          npm outdated || true
          echo "Security scan complete."
